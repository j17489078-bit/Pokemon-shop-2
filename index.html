<!DOCTYPE html>
<html>
<head>
    <title>Pokémon Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            background: url('https://i.imgur.com/6mR3Kwe.png') repeat;
            text-align: center;
            padding: 20px;
            color: #333;
        }
        h1 { color: #FF0000; text-shadow: 2px 2px #FFD700; }
        input, button {
            margin: 5px;
            padding: 8px;
            font-family: 'Press Start 2P', monospace;
            border-radius: 10px;
        }
        button {
            background: #FF0000;
            color: white;
            border: 2px solid #FFD700;
            cursor: pointer;
        }
        button:hover {
            background: #FFD700;
            color: #FF0000;
        }
        .card {
            display: inline-block;
            margin: 10px;
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 10px;
            background: #fff;
        }
    </style>
</head>
<body>

<h1>Pokémon Shop</h1>

<div id="shop"></div>

<h2>Add a New Card</h2>
<input type="text" id="cardNameInput" placeholder="Card Name">
<input type="number" id="cardPriceInput" placeholder="Price">
<button id="listCardBtn">List Card</button>

<a href="cart.html"><button>Go to Cart</button></a>

<script>
// ===== GLOBAL VARIABLES =====
let listings = JSON.parse(localStorage.getItem("listings")) || [];

// ===== DISPLAY SHOP =====
function displayShop() {
    const shop = document.getElementById("shop");
    shop.innerHTML = "";
    listings.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${item.image}" alt="${item.name}" style="width:150px;height:210px;">
            <h3>${item.name}</h3>
            <p>$${item.price}</p>
        `;
        shop.appendChild(div);
    });
}

// ===== LIST CARD BUTTON =====
document.getElementById("listCardBtn").addEventListener("click", async function() {
    const name = document.getElementById("cardNameInput").value.trim();
    const price = Number(document.getElementById("cardPriceInput").value);
    if(!name || !price) { alert("Enter both name and price"); return; }

    // Default placeholder image
    let imageURL = "https://via.placeholder.com/150x210?text=Pokémon";

    // Fetch Pokémon image from API
    try {
        const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:${encodeURIComponent(name)}`);
        const data = await response.json();
        if(data.data && data.data.length > 0) {
            imageURL = data.data[0].images.small || imageURL;
        }
    } catch(err) { console.error("Error fetching image:", err); }

    // Add card to listings and save
    listings.push({name, price, image: imageURL});
    localStorage.setItem("listings", JSON.stringify(listings));

    // Clear inputs
    document.getElementById("cardNameInput").value = "";
    document.getElementById("cardPriceInput").value = "";

    displayShop();
});

// ===== INITIAL DISPLAY =====
displayShop();
</script>

</body>
</html>
